# Change prefix from Ctrl+b to Ctrl+a (matches GNU Screen, easier to type)
set -g prefix C-b
bind C-b send-prefix

# Enable mouse mode (click to select panes, scroll, and resize)
set -g mouse on
set -g set-clipboard on

bind-key -T copy-mode MouseDragEnd1pane send-keys -X copy-pipe-and-cancel "wl-clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-clipboard"

# Split panes using easy-to-remember visual keys
bind | split-window -h -c "#{pane_current_path}" # Split horizontally (side-by-side)
bind - split-window -v -c "#{pane_current_path}" # Split vertically (top-and-bottom)
unbind '"'
unbind %

# Start window and pane numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Fast session switching
bind s choose-tree -s

# Reload this config without restarting tmux (prefix + r).
# Overrides the default "r" binding (refresh-client), which you rarely need by hand.
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Remove the delay when pressing Escape (fixes vim/nvim feeling laggy inside tmux)
set -sg escape-time 10

# Keep way more scrollback history than the 2000-line default
set -g history-limit 50000

# Use vi-style keys for scrolling/selecting text in copy mode (prefix + [ to enter)
# This only affects copy mode, not normal pane navigation, which stays on arrow keys
setw -g mode-keys vi

# Send copy-mode selections to the system clipboard via wl-copy (Wayland),
# so Enter/mouse-drag-release in copy mode also lands in Ctrl+V elsewhere
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Note: prefix + x (kill pane) and prefix + & (kill window) already ask for
# confirmation by default in tmux, no config needed for that.

# Status bar: show session name on the left, date/time on the right,
# and highlight the currently active window so you always know where you are
set -g status-left "#[fg=green,bold] #S "
set -g status-left-length 20
set -g status-right "#[fg=cyan] %H:%M  %d-%b-%y "
setw -g window-status-current-style "fg=black,bg=green,bold"
